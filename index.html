<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 글쓰기 도구</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --cream: #ede8d8;
    --accent: #c84b31;
    --accent2: #2d5a8e;
    --muted: #8a8070;
    --border: #d4cfc0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,170,150,0.15) 27px, rgba(180,170,150,0.15) 28px);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ─── LOGIN ─── */
  #loginScreen {
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
  }

  .login-box {
    background: white;
    border: 1px solid var(--border);
    padding: 3rem 3.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 4px 4px 0 var(--border);
  }

  .login-logo { text-align: center; margin-bottom: 2.5rem; }
  .login-logo h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; }
  .login-logo .subtitle { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 0.4rem; letter-spacing: 0.08em; }

  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: 0.72rem; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; }
  .field input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); background: var(--paper); font-family: 'Noto Serif KR', serif; font-size: 0.95rem; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--ink); }

  .btn-primary { width: 100%; padding: 0.85rem; background: var(--ink); color: white; border: none; font-family: 'Noto Serif KR', serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }

  .error-msg { color: var(--accent); font-size: 0.82rem; text-align: center; margin-top: 0.8rem; min-height: 1.2rem; font-family: 'DM Mono', monospace; }

  /* ─── APP ─── */
  #appScreen { flex-direction: column; max-width: 900px; margin: 0 auto; padding: 0 1.5rem; width: 100%; }

  .app-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0 1rem; border-bottom: 2px solid var(--ink); margin-bottom: 2rem; }
  .app-header h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.02em; }

  .btn-logout { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); background: none; border: 1px solid var(--border); padding: 0.3rem 0.7rem; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { color: var(--accent); border-color: var(--accent); }

  .section-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; }

  .type-section { margin-bottom: 1.8rem; }
  .type-tabs { display: flex; border: 1px solid var(--border); background: white; overflow: hidden; }
  .type-tab { flex: 1; padding: 0.75rem 0.5rem; text-align: center; font-family: 'Noto Serif KR', serif; font-size: 0.85rem; font-weight: 600; color: var(--muted); background: white; border: none; border-right: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .type-tab:last-child { border-right: none; }
  .type-tab:hover { background: var(--cream); color: var(--ink); }
  .type-tab.active { background: var(--ink); color: white; }
  .type-tab .tab-icon { display: block; font-size: 1.1rem; margin-bottom: 0.2rem; }
  .type-tab .tab-label { display: block; font-size: 0.75rem; }

  .input-section { margin-bottom: 1.5rem; }
  .prompt-label { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.6rem; }
  .prompt-hint { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); font-style: italic; }

  .prompt-textarea { width: 100%; min-height: 130px; padding: 1rem 1.2rem; border: 1px solid var(--border); background: white; font-family: 'Noto Serif KR', serif; font-size: 0.92rem; color: var(--ink); outline: none; resize: vertical; line-height: 1.7; transition: border-color 0.2s; }
  .prompt-textarea:focus { border-color: var(--ink); }
  .prompt-textarea::placeholder { color: var(--border); }

  .action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .char-count { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }

  .btn-generate { display: flex; align-items: center; gap: 0.6rem; padding: 0.85rem 2rem; background: var(--accent); color: white; border: none; font-family: 'Noto Serif KR', serif; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-generate:hover { background: #a33d28; }
  .btn-generate:disabled { background: var(--border); cursor: not-allowed; }

  .btn-generate .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { opacity: 0.6; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-section { display: none; margin-bottom: 3rem; }
  .output-section.visible { display: block; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
  .output-meta { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .output-actions { display: flex; gap: 0.5rem; }

  .btn-copy, .btn-clear { font-family: 'DM Mono', monospace; font-size: 0.68rem; padding: 0.3rem 0.7rem; border: 1px solid var(--border); background: white; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .btn-copy:hover { color: var(--accent2); border-color: var(--accent2); }
  .btn-clear:hover { color: var(--accent); border-color: var(--accent); }

  .output-box { background: white; border: 1px solid var(--border); border-left: 3px solid var(--accent2); padding: 1.8rem 2rem; line-height: 1.9; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; min-height: 200px; }
  .output-box.streaming::after { content: '▌'; color: var(--accent); animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <h1>AI 글쓰기<br>도구</h1>
      <div class="subtitle">CONTENT GENERATION SYSTEM</div>
    </div>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="loginId" placeholder="ID 입력" autocomplete="off">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="Password 입력">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">로그인</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <div class="app-header">
    <h1>AI 글쓰기 도구</h1>
    <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
  </div>

  <div class="type-section">
    <div class="section-label">글 유형 선택</div>
    <div class="type-tabs">
      <button class="type-tab active" data-type="blog" onclick="selectType(this)">
        <span class="tab-icon">📝</span>
        <span class="tab-label">네이버 블로그</span>
      </button>
      <button class="type-tab" data-type="threads" onclick="selectType(this)">
        <span class="tab-icon">🧵</span>
        <span class="tab-label">스레드</span>
      </button>
      <button class="type-tab" data-type="proposal" onclick="selectType(this)">
        <span class="tab-icon">📋</span>
        <span class="tab-label">제안서</span>
      </button>
    </div>
  </div>

  <div class="input-section">
    <div class="prompt-label">
      <div class="section-label">작업 명령</div>
      <span class="prompt-hint" id="inputHint">주제, 키워드, 요청사항을 입력하세요</span>
    </div>
    <textarea class="prompt-textarea" id="userPrompt" placeholder="예: 강남 피부과 보톡스 시술에 대한 블로그 글 작성. 키워드: 강남보톡스, 이마주름, 자연스러운시술"></textarea>
  </div>

  <div class="action-bar">
    <span class="char-count" id="charCount">0자</span>
    <button class="btn-generate" id="generateBtn" onclick="generateContent()">
      <div class="spinner"></div>
      <span class="btn-text">글 생성하기</span>
    </button>
  </div>

  <div class="output-section" id="outputSection">
    <div class="output-header">
      <span class="output-meta" id="outputMeta"></span>
      <div class="output-actions">
        <button class="btn-copy" onclick="copyOutput()">복사</button>
        <button class="btn-clear" onclick="clearOutput()">지우기</button>
      </div>
    </div>
    <div class="output-box" id="outputBox"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://writing-api.ultravapor1228.workers.dev';

const TYPE_HINTS = {
  blog: '주제, 목표 키워드, 타깃 독자를 입력하세요',
  threads: '전하고 싶은 메시지, 타깃, 분위기를 입력하세요',
  proposal: '클라이언트명, 업종, 현재 상황, 목표를 입력하세요'
};

let currentType = 'blog';

document.getElementById('loginId').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPw').focus(); });
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });

async function handleLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if(!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력해주세요'; return; }

  btn.disabled = true;
  btn.textContent = '확인 중...';
  errEl.textContent = '';

  try {
    const res = await fetch(`${WORKER_URL}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, pw })
    });
    const data = await res.json();

    if(data.success) {
      showScreen('appScreen');
    } else {
      errEl.textContent = data.message || '로그인 실패';
    }
  } catch(e) {
    errEl.textContent = '서버 연결 오류';
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function handleLogout() {
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('userPrompt').value = '';
  clearOutput();
  showScreen('loginScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectType(btn) {
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  document.getElementById('inputHint').textContent = TYPE_HINTS[currentType];
}

document.getElementById('userPrompt').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + '자';
});

async function generateContent() {
  const userPrompt = document.getElementById('userPrompt').value.trim();
  if(!userPrompt) { alert('작업 명령을 입력해주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  const outputSection = document.getElementById('outputSection');
  const outputBox = document.getElementById('outputBox');
  const outputMeta = document.getElementById('outputMeta');

  btn.classList.add('loading');
  btn.disabled = true;
  outputBox.textContent = '';
  outputBox.classList.add('streaming');
  outputSection.classList.add('visible');

  const typeNames = { blog: '네이버 블로그', threads: '스레드', proposal: '제안서' };
  outputMeta.textContent = `${typeNames[currentType]} · 생성 중...`;
  const startTime = Date.now();

  try {
    const res = await fetch(`${WORKER_URL}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contentType: currentType,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if(!res.ok) throw new Error(`서버 오류 (${res.status})`);

    const data = await res.json();
    const text = data.content?.[0]?.text || '';

    // 타이핑 효과
    let i = 0;
    const timer = setInterval(() => {
      outputBox.textContent = text.substring(0, i);
      i += 8;
      if(i > text.length) {
        outputBox.textContent = text;
        clearInterval(timer);
        outputBox.classList.remove('streaming');
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        outputMeta.textContent = `${typeNames[currentType]} · ${text.length}자 · ${elapsed}초`;
      }
    }, 16);

  } catch(err) {
    outputBox.textContent = `오류: ${err.message}`;
    outputBox.classList.remove('streaming');
    outputMeta.textContent = '생성 실패';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function copyOutput() {
  const text = document.getElementById('outputBox').textContent;
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

function clearOutput() {
  document.getElementById('outputBox').textContent = '';
  document.getElementById('outputSection').classList.remove('visible');
}
</script>
</body>
</html>
