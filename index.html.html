<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 글쓰기 도구</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --cream: #ede8d8;
    --accent: #c84b31;
    --accent2: #2d5a8e;
    --muted: #8a8070;
    --border: #d4cfc0;
    --success: #2d7a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,170,150,0.15) 27px, rgba(180,170,150,0.15) 28px);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ─── LOGIN ─── */
  #loginScreen {
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
  }

  .login-box {
    background: white;
    border: 1px solid var(--border);
    padding: 3rem 3.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 4px 4px 0 var(--border);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .login-logo h1 {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--ink);
    line-height: 1.2;
  }

  .login-logo .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
  }

  .field { margin-bottom: 1.2rem; }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    background: var(--paper);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--ink); }

  .btn-primary {
    width: 100%;
    padding: 0.85rem;
    background: var(--ink);
    color: white;
    border: none;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { background: var(--accent); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }

  .error-msg {
    color: var(--accent);
    font-size: 0.82rem;
    text-align: center;
    margin-top: 0.8rem;
    min-height: 1.2rem;
    font-family: 'DM Mono', monospace;
  }

  /* ─── MAIN APP ─── */
  #appScreen {
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem;
    width: 100%;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 1rem;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 2rem;
  }

  .app-header h1 {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .btn-logout {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-logout:hover { color: var(--accent); border-color: var(--accent); }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  /* 글 유형 탭 */
  .type-section { margin-bottom: 1.8rem; }

  .type-tabs {
    display: flex;
    border: 1px solid var(--border);
    background: white;
    overflow: hidden;
  }

  .type-tab {
    flex: 1;
    padding: 0.75rem 0.5rem;
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    background: white;
    border: none;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .type-tab:last-child { border-right: none; }
  .type-tab:hover { background: var(--cream); color: var(--ink); }
  .type-tab.active { background: var(--ink); color: white; }
  .type-tab .tab-icon { display: block; font-size: 1.1rem; margin-bottom: 0.2rem; }
  .type-tab .tab-label { display: block; font-size: 0.75rem; }

  /* 시스템 프롬프트 미리보기 */
  .prompt-preview {
    margin-bottom: 1.5rem;
    background: var(--cream);
    border: 1px dashed var(--border);
    padding: 1rem 1.2rem;
    display: none;
  }

  .prompt-preview.visible { display: block; }
  .preview-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .preview-text {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 80px;
    overflow: hidden;
  }

  /* 입력 */
  .input-section { margin-bottom: 1.5rem; }

  .prompt-label {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .prompt-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    font-style: italic;
  }

  .prompt-textarea {
    width: 100%;
    min-height: 130px;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    background: white;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.92rem;
    color: var(--ink);
    outline: none;
    resize: vertical;
    line-height: 1.7;
    transition: border-color 0.2s;
  }

  .prompt-textarea:focus { border-color: var(--ink); }
  .prompt-textarea::placeholder { color: var(--border); }

  .action-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }

  .btn-generate {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 2rem;
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-generate:hover { background: #a33d28; }
  .btn-generate:active { transform: translateY(1px); }
  .btn-generate:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .btn-generate .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { opacity: 0.6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 */
  .output-section { display: none; margin-bottom: 3rem; }
  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .output-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }

  .output-actions { display: flex; gap: 0.5rem; }

  .btn-copy, .btn-clear {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--border);
    background: white;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-copy:hover { color: var(--accent2); border-color: var(--accent2); }
  .btn-clear:hover { color: var(--accent); border-color: var(--accent); }

  .output-box {
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    padding: 1.8rem 2rem;
    line-height: 1.9;
    font-size: 0.95rem;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 200px;
  }

  .output-box.streaming::after {
    content: '▌';
    color: var(--accent);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <h1>AI 글쓰기<br>도구</h1>
      <div class="subtitle">CONTENT GENERATION SYSTEM</div>
    </div>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="loginId" placeholder="ID 입력" autocomplete="off">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="Password 입력">
    </div>
    <button class="btn-primary" onclick="handleLogin()">로그인</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="appScreen" class="screen">

  <div class="app-header">
    <h1>AI 글쓰기 도구</h1>
    <div class="header-right">
      <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 글 유형 -->
  <div class="type-section">
    <div class="section-label">글 유형 선택</div>
    <div class="type-tabs">
      <button class="type-tab active" data-type="blog" onclick="selectType(this)">
        <span class="tab-icon">📝</span>
        <span class="tab-label">네이버 블로그</span>
      </button>
      <button class="type-tab" data-type="threads" onclick="selectType(this)">
        <span class="tab-icon">🧵</span>
        <span class="tab-label">스레드</span>
      </button>
      <button class="type-tab" data-type="proposal" onclick="selectType(this)">
        <span class="tab-icon">📋</span>
        <span class="tab-label">제안서</span>
      </button>
    </div>
  </div>

  <!-- 시스템 프롬프트 미리보기 -->
  <div class="prompt-preview visible" id="promptPreview">
    <div class="preview-label">사용 중인 시스템 프롬프트</div>
    <div class="preview-text" id="previewText"></div>
  </div>

  <!-- 사용자 입력 -->
  <div class="input-section">
    <div class="prompt-label">
      <div class="section-label">작업 명령</div>
      <span class="prompt-hint" id="inputHint">주제, 키워드, 요청사항을 입력하세요</span>
    </div>
    <textarea class="prompt-textarea" id="userPrompt" placeholder="예: 강남 피부과 보톡스 시술에 대한 블로그 글 작성. 키워드: 강남보톡스, 이마주름, 자연스러운시술"></textarea>
  </div>

  <div class="action-bar">
    <span class="char-count" id="charCount">0자</span>
    <button class="btn-generate" id="generateBtn" onclick="generateContent()">
      <div class="spinner"></div>
      <span class="btn-text">글 생성하기</span>
    </button>
  </div>

  <!-- 결과 -->
  <div class="output-section" id="outputSection">
    <div class="output-header">
      <span class="output-meta" id="outputMeta"></span>
      <div class="output-actions">
        <button class="btn-copy" onclick="copyOutput()">복사</button>
        <button class="btn-clear" onclick="clearOutput()">지우기</button>
      </div>
    </div>
    <div class="output-box" id="outputBox"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// ① 여기에 Cloudflare Workers URL 입력
const WORKER_URL = 'https://writing-api.mingday.workers.dev';

// ② 로그인 계정 설정
const CREDENTIALS = {
  id: 'admin',      // ← 변경
  pw: 'pass1234'    // ← 변경
};

// ③ 시스템 프롬프트 (나중에 교체)
const SYSTEM_PROMPTS = {
  blog: `당신은 네이버 블로그 SEO 전문 콘텐츠 작가입니다.

다음 원칙을 반드시 지켜 글을 작성하세요:
- 네이버 검색 최적화를 고려한 자연스러운 키워드 배치
- 소제목 구조로 읽기 쉽게 구성
- 실제 독자에게 도움이 되는 정보 중심 서술
- 글자수: 1,500~2,000자 내외
- 마지막에 자연스러운 CTA 포함
- 제목은 클릭율 높은 형태로 작성

출력 형식:
[제목]
(본문)
[태그]`,

  threads: `당신은 병원/전문직 클라이언트를 위한 스레드(Threads) 콘텐츠 전문가입니다.

다음 원칙으로 작성하세요:
- 첫 줄에서 즉각적인 관심을 끄는 훅(hook) 문장
- 500자 내외의 짧고 임팩트 있는 본문
- 공감, 정보, 반전 요소 중 하나 포함
- 전문성은 드러내되 딱딱하지 않은 말투
- 마지막 줄에 반응 유도 문구
- 이모지 2~3개 자연스럽게 활용`,

  proposal: `당신은 병원·법률·전문직 마케팅 전문 에이전시의 시니어 기획자입니다.

제안서 작성 원칙:
- 클라이언트의 현재 상황과 문제점 분석부터 시작
- 구체적인 수치와 KPI 중심으로 서술
- 경쟁사 대비 차별화 포인트 명확히 제시
- 실행 가능한 액션플랜과 타임라인 포함
- 투자 대비 기대 효과(ROI) 논리적으로 설명`
};
// ══════════════════════════════════════════

const TYPE_HINTS = {
  blog: '주제, 목표 키워드, 타깃 독자를 입력하세요',
  threads: '전하고 싶은 메시지, 타깃, 분위기를 입력하세요',
  proposal: '클라이언트명, 업종, 현재 상황, 목표를 입력하세요'
};

let currentType = 'blog';

// 로그인
document.getElementById('loginId').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPw').focus(); });
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });

function handleLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if(id === CREDENTIALS.id && pw === CREDENTIALS.pw) {
    showScreen('appScreen');
    updateTypeUI();
  } else {
    document.getElementById('loginError').textContent = '아이디 또는 비밀번호가 올바르지 않습니다';
    document.getElementById('loginPw').value = '';
  }
}

function handleLogout() {
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('userPrompt').value = '';
  clearOutput();
  showScreen('loginScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectType(btn) {
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  updateTypeUI();
}

function updateTypeUI() {
  document.getElementById('inputHint').textContent = TYPE_HINTS[currentType];
  document.getElementById('previewText').textContent = SYSTEM_PROMPTS[currentType].substring(0, 200) + '...';
}

document.getElementById('userPrompt').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + '자';
});

async function generateContent() {
  const userPrompt = document.getElementById('userPrompt').value.trim();
  if(!userPrompt) { alert('작업 명령을 입력해주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  const outputSection = document.getElementById('outputSection');
  const outputBox = document.getElementById('outputBox');
  const outputMeta = document.getElementById('outputMeta');

  btn.classList.add('loading');
  btn.disabled = true;
  outputBox.textContent = '';
  outputBox.classList.add('streaming');
  outputSection.classList.add('visible');

  const typeNames = { blog: '네이버 블로그', threads: '스레드', proposal: '제안서' };
  outputMeta.textContent = `${typeNames[currentType]} · 생성 중...`;

  const startTime = Date.now();

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: SYSTEM_PROMPTS[currentType],
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if(!response.ok) throw new Error(`서버 오류 (${response.status})`);

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    // 타이핑 효과로 출력
    let i = 0;
    const typeInterval = setInterval(() => {
      outputBox.textContent = text.substring(0, i);
      i += 8;
      if(i > text.length) {
        outputBox.textContent = text;
        clearInterval(typeInterval);
        outputBox.classList.remove('streaming');
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        outputMeta.textContent = `${typeNames[currentType]} · ${text.length}자 · ${elapsed}초`;
      }
    }, 16);

  } catch(err) {
    outputBox.textContent = `오류가 발생했습니다:\n${err.message}\n\nWorker URL을 확인해주세요.`;
    outputBox.classList.remove('streaming');
    outputMeta.textContent = '생성 실패';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function copyOutput() {
  const text = document.getElementById('outputBox').textContent;
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function clearOutput() {
  document.getElementById('outputBox').textContent = '';
  document.getElementById('outputSection').classList.remove('visible');
}

updateTypeUI();
</script>
</body>
</html>
